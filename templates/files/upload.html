<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: light-dark(#fefefe, #1c1c1c);
        color: light-dark(#1c1c1c, #fefefe);
      }

      form {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 1rem;
      }

      button[type="submit"] {
        padding: 0.5rem;
        border-radius: 0.5rem;
        border: none;
        background: light-dark(#1c1c1c, #fefefe);
        color: light-dark(#fefefe, #1c1c1c);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <form method="post" action="/upload" enctype="multipart/form-data">
      <input name="file" type="file" required />
      <button type="submit">Upload</button>
    </form>
    <p class="uploadLink"></p>

    <script>
      const fileUpload = document.querySelector("input");
      const uploadFileButton = document.querySelector("button");
      const uploadLink = document.querySelector(".uploadLink");
      fileUpload.style.display = "none";

      uploadFileButton.addEventListener("click", async (e) => {
        e.preventDefault();

        fileUpload.click();
      });

      fileUpload.addEventListener("change", async (e) => {
        e.preventDefault();

        const file = e.target.files[0];
        const formData = new FormData();
        formData.append("file", file);
        const response = await fetch("/upload", {
          method: "POST",
          body: formData,
        });

        const data = await response.text();

        uploadLink.innerHTML = `<a href="/file/${data}" target="_blank">${data}</a>`;
      });
    </script>
  </body>
</html>
